<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Explotools — Controle de Tarefas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#d81b2a;--bg:#07090e;--surface:#0d1018;--surface2:#111520;--surface3:#161c28;--border:#1c2235;--border2:#242d42;--text:#c8d4e8;--text-bright:#e8eef8;--text-muted:#4a566e;--text-dim:#2e3a50;--green:#22c55e;--amber:#f5a623;--blue:#2f7fe0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(rgba(100,130,200,.04) 1px,transparent 1px);background-size:22px 22px}
.head{background:linear-gradient(180deg,#0a0c14,#080a10);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:relative;overflow:hidden}
.head::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red) 50%,transparent)}
.head img{height:32px;filter:drop-shadow(0 0 12px rgba(216,27,42,.35))}
.head .mod{font-family:'Barlow Condensed';font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);border-left:1px solid var(--border2);padding-left:16px}
.back{margin-left:auto;font-family:'Barlow Condensed';font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);text-decoration:none}
.back:hover{color:var(--red)}
.wrap{max-width:1280px;margin:20px auto 60px;padding:0 20px}

/* ── Toolbar ── */
.bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.btn{font-family:'Barlow Condensed';font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:9px 16px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;transition:border-color .15s,background .15s}
.btn:hover{border-color:var(--text-muted)}
.btn.primary{background:linear-gradient(135deg,#b0111c,var(--red),#e02030);border:none;color:#fff;box-shadow:0 3px 16px rgba(216,27,42,.3)}
.nav{display:flex;gap:4px}
.nav .btn{padding:9px 12px}
.periodo{font-family:'Barlow Condensed';font-size:19px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text-bright);min-width:210px;text-align:center}
.views{display:flex;gap:0;border:1px solid var(--border2);border-radius:6px;overflow:hidden;margin-left:auto}
.views .btn{border:none;border-radius:0;border-right:1px solid var(--border2)}
.views .btn:last-child{border-right:none}
.views .btn.on{background:var(--red);color:#fff}
.bar2{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
select,input[type=text].busca{background:var(--bg);border:1.5px solid var(--border2);border-radius:6px;color:var(--text-bright);font-size:13px;font-family:'Barlow',sans-serif;padding:8px 12px}
select:focus,input.busca:focus{outline:none;border-color:var(--red)}
.chip-t{font-family:'Barlow Condensed';font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text-muted);cursor:pointer;user-select:none}
.chip-t.on{background:var(--surface3);color:var(--text-bright);border-color:var(--text-muted)}
.chip-venc{border-color:rgba(216,27,42,.5);color:#f08a93}
.chip-venc.on{background:rgba(216,27,42,.15)}
.sync{margin-left:auto;font-family:'Barlow Condensed';font-weight:700;font-size:11px;letter-spacing:.5px;text-transform:uppercase}

/* ── Cartões / grades ── */
.painel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.mes-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.mes-cab{font-family:'Barlow Condensed';font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);text-align:center;padding:9px 4px;border-bottom:1px solid var(--border);background:var(--bg)}
.mes-cel{min-height:96px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px 5px 7px;cursor:pointer;transition:background .12s;position:relative}
.mes-cel:nth-child(7n){border-right:none}
.mes-cel:hover{background:rgba(255,255,255,.02)}
.mes-cel.fora{opacity:.35}
.mes-num{font-family:'Barlow Condensed';font-size:12px;font-weight:800;color:var(--text-muted);margin-bottom:4px}
.mes-cel.hoje{background:rgba(216,27,42,.05)}
.mes-cel.hoje .mes-num{color:var(--red)}
.pill{display:block;font-size:11px;line-height:1.35;padding:2px 6px;border-radius:4px;margin-bottom:3px;background:var(--surface3);border-left:3px solid var(--resp,#2f7fe0);color:var(--text-bright);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill:hover{filter:brightness(1.25)}
.pill .h{color:var(--text-muted);font-weight:600}
.pill.done{text-decoration:line-through;opacity:.42}
.pill.venc{background:rgba(216,27,42,.14);border-left-color:var(--red);color:#f4a7ae}
.pill.alta{box-shadow:inset 0 0 0 1px rgba(245,166,35,.4)}
.pill.fim{background:rgba(216,27,42,.12);border-left-color:var(--red);color:#f4a7ae}
.pchk{display:inline-block;width:11px;height:11px;border-radius:50%;border:1.5px solid var(--text-dim);vertical-align:middle;margin-right:5px;cursor:pointer}
.pchk:hover{border-color:var(--green)}
.pchk.on{background:var(--green);border-color:var(--green)}
.tag-fim{color:#f08a93;font-weight:700}
.sem-cab{cursor:pointer}
.mais{font-size:10px;color:var(--text-muted);cursor:pointer}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2f7fe0}
.dots{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}
.dot-mais{font-size:9px;color:var(--text-muted);line-height:7px}

.sem-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.sem-col{border-right:1px solid var(--border);min-height:340px;padding:6px}
.sem-col:last-child{border-right:none}
.sem-cab{text-align:center;padding:8px 4px;border-bottom:1px solid var(--border);background:var(--bg)}
.sem-cab .d{font-family:'Barlow Condensed';font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted)}
.sem-cab .n{font-family:'Barlow Condensed';font-size:19px;font-weight:900;color:var(--text)}
.sem-cab.hoje .n{color:var(--red)}
.sem-add{width:100%;background:none;border:1px dashed var(--border2);border-radius:4px;color:var(--text-dim);font-size:11px;padding:3px;cursor:pointer;margin-bottom:5px}
.sem-add:hover{color:var(--text-muted);border-color:var(--text-muted)}

.dia-lista{padding:14px}
.dia-item{display:flex;align-items:flex-start;gap:12px;padding:11px 12px;border-bottom:1px solid var(--border);border-radius:6px}
.dia-item:hover{background:rgba(255,255,255,.02)}
.dia-hora{font-family:'Barlow Condensed';font-size:14px;font-weight:800;color:var(--text-muted);width:52px;flex-shrink:0;padding-top:2px}
.check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);background:none;cursor:pointer;flex-shrink:0;margin-top:2px;transition:all .15s}
.check:hover{border-color:var(--green)}
.check.on{background:var(--green);border-color:var(--green)}
.check.on::after{content:'✓';color:#04120a;font-size:12px;font-weight:900;display:block;text-align:center;line-height:16px}
.t-corpo{flex:1;min-width:0;cursor:pointer}
.t-tit{font-size:14px;font-weight:600;color:var(--text-bright)}
.t-tit.done{text-decoration:line-through;opacity:.45}
.t-sub{font-size:12px;color:var(--text-muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap}
.tag-resp{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10.5px;font-weight:700;background:var(--surface3);border-left:3px solid var(--resp,#2f7fe0)}
.tag-venc{color:#f08a93;font-weight:700}
.tag-alta{color:var(--amber);font-weight:700}
.tag-rec{color:var(--text-muted)}
.secao{font-family:'Barlow Condensed';font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);padding:16px 14px 8px;border-bottom:1px solid var(--border)}
.secao.venc{color:#f08a93}
.vazio{color:var(--text-dim);font-style:italic;padding:26px;text-align:center;font-size:13.5px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:480px;padding:26px;box-shadow:0 20px 80px rgba(0,0,0,.7)}
.modal h2{font-family:'Barlow Condensed';font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--text-bright);margin-bottom:18px}
.modal label{display:block;font-family:'Barlow Condensed';font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);margin:14px 0 5px}
.modal input,.modal select,.modal textarea{width:100%;background:var(--bg);border:1.5px solid var(--border2);border-radius:6px;color:var(--text-bright);font-size:14px;font-family:'Barlow',sans-serif;padding:10px 12px}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--red)}
.modal textarea{resize:vertical;min-height:60px}
.linha2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dias-sem{display:flex;gap:5px;margin-top:6px}
.dia-chk{flex:1;text-align:center;padding:7px 0;border:1px solid var(--border2);border-radius:5px;cursor:pointer;font-family:'Barlow Condensed';font-size:11px;font-weight:800;color:var(--text-muted);user-select:none}
.dia-chk.on{background:var(--red);border-color:var(--red);color:#fff}
.modal-acoes{display:flex;gap:10px;margin-top:22px}
.modal-acoes .btn{flex:1;padding:12px}
.btn-excluir{border-color:rgba(216,27,42,.4);color:#f08a93}
.btn-excluir:hover{background:rgba(216,27,42,.12)}
@media(max-width:820px){
  .mes-cel{min-height:64px}
  .sem-grid{grid-template-columns:1fr}
  .sem-col{min-height:auto;border-right:none;border-bottom:1px solid var(--border)}
  .periodo{min-width:auto}
}
@media(max-width:640px){
  .wrap{padding:0 12px;margin-top:14px}
  .head{padding:12px 16px;gap:12px}
  .head .mod{padding-left:12px}
  .bar{gap:8px}
  .bar .btn.primary{order:-1;flex:1 0 100%}
  .nav{order:2}
  .periodo{order:3;flex:1;min-width:0;font-size:16px;text-align:left}
  .views{order:4;margin-left:0;width:100%}
  .views .btn{flex:1;text-align:center;padding:11px 4px}
  .bar2{gap:8px}
  .bar2 select,.bar2 .busca{flex:1 1 100%}
  .chip-t{flex:1;text-align:center}
  .sync{margin-left:0;flex:1 0 100%;text-align:center}
  .mes-cab{padding:6px 2px;font-size:9px;letter-spacing:1px}
  .mes-cel{min-height:52px;padding:4px 3px}
  .mes-num{font-size:13px;margin-bottom:3px}
  .dot{width:7px;height:7px}
  .dia-item{padding:14px 10px}
  .check{width:26px;height:26px}
  .check.on::after{line-height:22px;font-size:14px}
  .pchk{width:15px;height:15px;margin-right:6px}
  .sem-col{padding:8px 10px}
  .pill{font-size:12.5px;padding:6px 9px}
  .overlay{padding:10px}
  .modal{padding:20px 18px;max-width:100%;border-radius:12px}
  .linha2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="head">
  <img src="../../assets/explotools-logo.png" alt="Explotools" onerror="this.style.display='none'">
  <div class="mod">Controle de Tarefas</div>
  <a class="back" href="../../index.html">&lsaquo; Central</a>
</div>

<div class="wrap">
  <div class="bar">
    <button class="btn primary" onclick="novaTarefa()">+ Nova tarefa</button>
    <div class="nav">
      <button class="btn" onclick="irHoje()">Hoje</button>
      <button class="btn" onclick="navegar(-1)">&lsaquo;</button>
      <button class="btn" onclick="navegar(1)">&rsaquo;</button>
    </div>
    <div class="periodo" id="periodo"></div>
    <div class="views">
      <button class="btn" id="v-dia" onclick="setView('dia')">Dia</button>
      <button class="btn" id="v-semana" onclick="setView('semana')">Semana</button>
      <button class="btn" id="v-mes" onclick="setView('mes')">Mês</button>
      <button class="btn" id="v-lista" onclick="setView('lista')">Lista</button>
    </div>
  </div>
  <div class="bar2">
    <select id="f-resp" onchange="desenhar()"><option value="">Todos os responsáveis</option></select>
    <input type="text" class="busca" id="f-busca" placeholder="Buscar tarefa..." oninput="desenhar()">
    <span class="chip-t" id="f-conc" onclick="toggleConc()">Mostrar concluídas</span>
    <span class="chip-t chip-venc" id="f-venc" onclick="verVencidas()">⚠ <b id="n-venc">0</b> vencida(s)</span>
    <span class="sync" id="sync"></span>
  </div>

  <div class="painel" id="painel"></div>
</div>

<!-- Modal de tarefa -->
<div class="overlay" id="overlay" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <h2 id="m-titulo">Nova tarefa</h2>
    <label>Título *</label>
    <input type="text" id="m-tit" placeholder="O que precisa ser feito?">
    <label>Responsável</label>
    <input type="text" id="m-resp" list="resp-list" placeholder="Quem vai fazer">
    <datalist id="resp-list"></datalist>
    <div class="linha2">
      <div><label>Início *</label><input type="date" id="m-data"></div>
      <div id="m-fim-wrap"><label>Término (opcional)</label><input type="date" id="m-datafim"></div>
    </div>
    <div class="linha2">
      <div><label>Horário (opcional)</label><input type="time" id="m-hora"></div>
      <div>
        <label>Prioridade</label>
        <select id="m-prio"><option value="normal">Normal</option><option value="alta">Alta 🔥</option></select>
      </div>
    </div>
    <label>Repetição (rotina)</label>
    <select id="m-rec" onchange="mostraDias()">
      <option value="nenhuma">Não repete</option>
      <option value="diaria">Todo dia</option>
      <option value="semanal">Semanal</option>
      <option value="mensal">Mensal (mesmo dia)</option>
    </select>
    <div id="m-dias-wrap" style="display:none">
      <label>Dias da semana</label>
      <div class="dias-sem" id="m-dias"></div>
    </div>
    <label>Observação</label>
    <textarea id="m-obs" placeholder="Detalhes, links, contexto..."></textarea>
    <div class="modal-acoes">
      <button class="btn btn-excluir" id="m-del" onclick="excluirTarefa()" style="display:none">Excluir</button>
      <button class="btn" onclick="fecharModal()">Cancelar</button>
      <button class="btn primary" onclick="salvarTarefa()">Salvar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════ Estado / persistência ═══════════════
var STORE_KEY='explotools_tarefas_v1';
var SYNC_URL='https://explotools-tarefas-store.ramoncuri.workers.dev';
var SYNC_KEY='EXPLO-7906c5f6f0435578904f36cb';
var DIAS_L=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var CORES=['#2f7fe0','#22c55e','#e8870c','#7c3aed','#0ea5a5','#e0447a','#94a838','#5c6cf5'];

var tarefas=carregar();
var view='semana';
var cursor=hojeISO();           // data de referência da navegação
var mostrarConc=false;
var editandoId=null;

function carregar(){
  try{var d=JSON.parse(localStorage.getItem(STORE_KEY));if(d&&Array.isArray(d.tarefas))return d.tarefas;}catch(e){}
  return [];
}
function salvar(){localStorage.setItem(STORE_KEY,JSON.stringify({tarefas:tarefas}));agendarSync();}

var _syncTimer=null;
function setSync(s){
  var el=document.getElementById('sync');
  var map={carregando:['sincronizando…','#f5a623'],salvando:['salvando…','#f5a623'],ok:['✓ sincronizado','#22c55e'],erro:['erro ao sincronizar','#d81b2a'],offline:['offline (salvo só aqui)','#d81b2a']};
  var m=map[s]||['',''];el.textContent=m[0];el.style.color=m[1];
}
function agendarSync(){setSync('salvando');if(_syncTimer)clearTimeout(_syncTimer);_syncTimer=setTimeout(syncSave,800);}
function syncSave(){
  fetch(SYNC_URL+'/?k='+SYNC_KEY,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({tarefas:tarefas})})
    .then(function(r){setSync(r.ok?'ok':'erro');}).catch(function(){setSync('offline');});
}
function syncLoad(){
  setSync('carregando');
  fetch(SYNC_URL+'/?k='+SYNC_KEY,{cache:'no-store'})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){
      if(d&&Array.isArray(d.tarefas)&&d.tarefas.length){
        tarefas=d.tarefas;localStorage.setItem(STORE_KEY,JSON.stringify({tarefas:tarefas}));desenhar();setSync('ok');
      } else if(tarefas.length){ syncSave(); } else { setSync('ok'); }
    }).catch(function(){setSync('offline');});
}

// ═══════════════ Datas ═══════════════
function hojeISO(){var d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function ehMobile(){return !!(window.matchMedia&&window.matchMedia('(max-width:640px)').matches);}
function p2(n){return (n<10?'0':'')+n;}
function dISO(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function deISO(s){var a=s.split('-');return new Date(+a[0],+a[1]-1,+a[2]);}
function addDias(s,n){var d=deISO(s);d.setDate(d.getDate()+n);return dISO(d);}
function domingoDe(s){var d=deISO(s);d.setDate(d.getDate()-d.getDay());return dISO(d);}
function agoraHM(){var d=new Date();return p2(d.getHours())+':'+p2(d.getMinutes());}
function fmtBR(s){var a=s.split('-');return a[2]+'/'+a[1]+'/'+a[0];}

// ═══════════════ Regras de tarefa ═══════════════
function ocorreEm(t,dia){
  if(!t.data)return false;
  if(dia<t.data)return false;
  if(t.rec==='diaria')return true;
  if(t.rec==='semanal'){
    var dias=(t.recDias&&t.recDias.length)?t.recDias:[deISO(t.data).getDay()];
    return dias.indexOf(deISO(dia).getDay())!==-1;
  }
  if(t.rec==='mensal')return deISO(dia).getDate()===deISO(t.data).getDate();
  // nenhuma: tarefa de 1 dia ou intervalo [data inicio, dataFim]
  if(t.dataFim&&t.dataFim>t.data)return dia>=t.data&&dia<=t.dataFim;
  return t.data===dia;
}
function prazoDe(t){return ((!t.rec||t.rec==='nenhuma')&&t.dataFim&&t.dataFim>t.data)?t.dataFim:t.data;}
function ehFinal(t,dia){return (!t.rec||t.rec==='nenhuma')&&t.dataFim&&t.dataFim>t.data&&dia===t.dataFim;}
function feita(t,dia){
  if(t.rec&&t.rec!=='nenhuma')return (t.doneDates||[]).indexOf(dia)!==-1;
  return !!t.done;
}
function vencida(t,dia){
  if(feita(t,dia))return false;
  var h=hojeISO();
  if(t.rec&&t.rec!=='nenhuma'){ // rotina: cada ocorrencia vence no proprio dia
    if(dia<h)return true;
    if(dia===h&&t.hora&&t.hora<agoraHM())return true;
    return false;
  }
  // tarefa unica ou de intervalo: so vence no dia do prazo (data final)
  var pz=prazoDe(t);
  if(dia!==pz)return false;
  if(pz<h)return true;
  if(pz===h&&t.hora&&t.hora<agoraHM())return true;
  return false;
}
function toggleFeita(id,dia){
  var t=achar(id);if(!t)return;
  if(t.rec&&t.rec!=='nenhuma'){
    t.doneDates=t.doneDates||[];
    var i=t.doneDates.indexOf(dia);
    if(i===-1)t.doneDates.push(dia);else t.doneDates.splice(i,1);
  } else { t.done=!t.done; }
  salvar();desenhar();
}
function achar(id){for(var i=0;i<tarefas.length;i++)if(tarefas[i].id===id)return tarefas[i];return null;}
function corResp(nome){
  if(!nome)return '#4a566e';
  var h=0;for(var i=0;i<nome.length;i++)h=(h*31+nome.charCodeAt(i))>>>0;
  return CORES[h%CORES.length];
}
function passaFiltro(t){
  var r=document.getElementById('f-resp').value;
  if(r&&(t.resp||'')!==r)return false;
  var q=document.getElementById('f-busca').value.trim().toLowerCase();
  if(q&&(t.titulo+' '+(t.obs||'')+' '+(t.resp||'')).toLowerCase().indexOf(q)===-1)return false;
  return true;
}
// ocorrências de um dia, filtradas e ordenadas por hora
function tarefasDoDia(dia){
  var out=[];
  tarefas.forEach(function(t){
    if(!passaFiltro(t))return;
    if(!ocorreEm(t,dia))return;
    if(!mostrarConc&&feita(t,dia))return;
    out.push(t);
  });
  out.sort(function(a,b){
    var ha=a.hora||'99:99',hb=b.hora||'99:99';
    if(ha!==hb)return ha<hb?-1:1;
    var pa=a.prio==='alta'?0:1,pb=b.prio==='alta'?0:1;
    if(pa!==pb)return pa-pb;
    return (a.titulo||'').localeCompare(b.titulo||'');
  });
  return out;
}
function contarVencidas(){
  var n=0,h=hojeISO();
  tarefas.forEach(function(t){
    if(!passaFiltro(t))return;
    if(t.rec&&t.rec!=='nenhuma'){
      for(var d=addDias(h,-7);d<=h;d=addDias(d,1))
        if(ocorreEm(t,d)&&vencida(t,d))n++;
    } else { var pz=prazoDe(t); if(vencida(t,pz)) n++; }
  });
  return n;
}

// ═══════════════ Views ═══════════════
function setView(v){view=v;desenhar();}
function irHoje(){cursor=hojeISO();desenhar();}
function navegar(dir){
  if(view==='dia')cursor=addDias(cursor,dir);
  else if(view==='semana')cursor=addDias(cursor,7*dir);
  else{var d=deISO(cursor);d.setDate(1);d.setMonth(d.getMonth()+dir);cursor=dISO(d);}
  desenhar();
}
function toggleConc(){mostrarConc=!mostrarConc;desenhar();}
function verVencidas(){view='lista';desenhar();window.scrollTo(0,0);}

function pillHTML(t,dia){
  var done=feita(t,dia),venc=vencida(t,dia),fim=ehFinal(t,dia);
  var cls='pill'+(done?' done':'')+(venc?' venc':'')+((fim&&!venc)?' fim':'')+(t.prio==='alta'?' alta':'');
  var fogo=t.prio==='alta'?'🔥 ':'';
  return '<span class="'+cls+'" style="--resp:'+corResp(t.resp)+'" onclick="event.stopPropagation();abrirTarefa(\''+t.id+'\')" title="'+esc(t.titulo)+(t.resp?' — '+esc(t.resp):'')+(fim?' (prazo final)':'')+'">'+
    '<span class="pchk'+(done?' on':'')+'" onclick="event.stopPropagation();toggleFeita(\''+t.id+'\',\''+dia+'\')" title="Concluir"></span>'+
    (t.hora?'<span class="h">'+t.hora+'</span> ':'')+fogo+esc(t.titulo)+'</span>';
}
function itemHTML(t,dia,comData){
  var done=feita(t,dia),fim=ehFinal(t,dia);
  var multi=(!t.rec||t.rec==='nenhuma')&&t.dataFim&&t.dataFim>t.data;
  var sub=[];
  if(comData)sub.push(fmtBR(dia));
  if(t.resp)sub.push('<span class="tag-resp" style="--resp:'+corResp(t.resp)+'">'+esc(t.resp)+'</span>');
  if(vencida(t,dia))sub.push('<span class="tag-venc">⚠ vencida</span>');
  else if(fim)sub.push('<span class="tag-fim">🏁 prazo final</span>');
  if(t.prio==='alta')sub.push('<span class="tag-alta">🔥 alta</span>');
  if(t.rec&&t.rec!=='nenhuma')sub.push('<span class="tag-rec">↻ rotina</span>');
  if(multi)sub.push('<span class="tag-rec">'+fmtBR(t.data).slice(0,5)+'→'+fmtBR(t.dataFim).slice(0,5)+'</span>');
  if(t.obs)sub.push(esc(t.obs.slice(0,60)));
  return '<div class="dia-item">'+
    '<div class="dia-hora">'+(t.hora||'—')+'</div>'+
    '<button class="check'+(done?' on':'')+'" onclick="toggleFeita(\''+t.id+'\',\''+dia+'\')" title="Marcar como concluída"></button>'+
    '<div class="t-corpo" onclick="abrirTarefa(\''+t.id+'\')">'+
      '<div class="t-tit'+(done?' done':'')+'">'+(t.prio==='alta'?'🔥 ':'')+esc(t.titulo)+'</div>'+
      '<div class="t-sub">'+sub.join(' ')+'</div>'+
    '</div></div>';
}

function desenhar(){
  atualizarResponsaveis();
  document.getElementById('n-venc').textContent=contarVencidas();
  document.getElementById('f-conc').className='chip-t'+(mostrarConc?' on':'');
  ['dia','semana','mes','lista'].forEach(function(v){document.getElementById('v-'+v).className='btn'+(v===view?' on':'');});
  var p=document.getElementById('painel'),per=document.getElementById('periodo');

  if(view==='mes'){
    var d=deISO(cursor);per.textContent=MESES[d.getMonth()]+' '+d.getFullYear();
    var prim=new Date(d.getFullYear(),d.getMonth(),1);
    var ini=dISO(prim);ini=domingoDe(ini);
    var mob=ehMobile();
    var html='<div class="mes-grid">'+DIAS_L.map(function(x){return '<div class="mes-cab">'+(mob?x[0]:x)+'</div>';}).join('');
    var dia=ini;
    for(var i=0;i<42;i++){
      var dd=deISO(dia);
      var fora=dd.getMonth()!==d.getMonth();
      var ts=tarefasDoDia(dia);
      var corpo,cellClick;
      if(mob){
        // celular: pontinhos (toque no dia abre a visao do Dia)
        var dots=ts.slice(0,4).map(function(t){return '<span class="dot" style="background:'+(vencida(t,dia)?'#d81b2a':corResp(t.resp))+'"></span>';}).join('');
        corpo='<div class="mes-num">'+dd.getDate()+'</div><div class="dots">'+dots+(ts.length>4?'<span class="dot-mais">+</span>':'')+'</div>';
        cellClick='cursor=\''+dia+'\';setView(\'dia\')';
      } else {
        var pills=ts.slice(0,3).map(function(t){return pillHTML(t,dia);}).join('');
        if(ts.length>3)pills+='<span class="mais" onclick="event.stopPropagation();cursor=\''+dia+'\';setView(\'dia\')">+'+(ts.length-3)+' mais…</span>';
        corpo='<div class="mes-num">'+dd.getDate()+'</div>'+pills;
        cellClick='novaTarefa(\''+dia+'\')';
      }
      html+='<div class="mes-cel'+(fora?' fora':'')+(dia===hojeISO()?' hoje':'')+'" onclick="'+cellClick+'">'+corpo+'</div>';
      dia=addDias(dia,1);
    }
    p.innerHTML=html+'</div>';

  } else if(view==='semana'){
    var ini=domingoDe(cursor),fim=addDias(ini,6);
    per.textContent=fmtBR(ini).slice(0,5)+' — '+fmtBR(fim);
    var cab='',cols='';
    for(var i=0;i<7;i++){
      var dia=addDias(ini,i);
      cab+='<div class="sem-cab'+(dia===hojeISO()?' hoje':'')+'" onclick="cursor=\''+dia+'\';setView(\'dia\')" title="Ver o dia"><div class="d">'+DIAS_L[i]+'</div><div class="n">'+deISO(dia).getDate()+'</div></div>';
      var ts=tarefasDoDia(dia);
      cols+='<div class="sem-col">'+
        '<button class="sem-add" onclick="novaTarefa(\''+dia+'\')">+</button>'+
        ts.map(function(t){return pillHTML(t,dia);}).join('')+'</div>';
    }
    p.innerHTML='<div class="sem-grid">'+cab+'</div><div class="sem-grid">'+cols+'</div>';

  } else if(view==='dia'){
    var dd=deISO(cursor);
    per.textContent=DIAS_L[dd.getDay()]+', '+fmtBR(cursor);
    var ts=tarefasDoDia(cursor);
    p.innerHTML='<div class="dia-lista">'+
      (ts.length?ts.map(function(t){return itemHTML(t,cursor,false);}).join(''):'<div class="vazio">Nenhuma tarefa neste dia. Clique em “+ Nova tarefa”.</div>')+
      '</div>';

  } else { // lista de pendências
    per.textContent='Pendências';
    var h=hojeISO();
    var vencidas=[],hoje=[],prox=[],depois=[],concl=[];
    tarefas.forEach(function(t){
      if(!passaFiltro(t))return;
      if(t.rec&&t.rec!=='nenhuma'){
        for(var d=addDias(h,-7);d<=addDias(h,30);d=addDias(d,1)){
          if(!ocorreEm(t,d))continue;
          if(feita(t,d)){if(d>=addDias(h,-2))concl.push([t,d]);continue;}
          if(vencida(t,d))vencidas.push([t,d]);
          else if(d===h)hoje.push([t,d]);
          else if(d<=addDias(h,7))prox.push([t,d]);
        }
      } else {
        var d=prazoDe(t);
        if(feita(t,d)){concl.push([t,d]);return;}
        if(vencida(t,d))vencidas.push([t,d]);
        else if(d===h)hoje.push([t,d]);
        else if(d<=addDias(h,7))prox.push([t,d]);
        else depois.push([t,d]);
      }
    });
    var ord=function(a,b){return a[1]===b[1]?((a[0].hora||'99')<(b[0].hora||'99')?-1:1):(a[1]<b[1]?-1:1);};
    [vencidas,hoje,prox,depois,concl].forEach(function(x){x.sort(ord);});
    function secao(nome,arr,cls){
      if(!arr.length)return '';
      return '<div class="secao '+(cls||'')+'">'+nome+' ('+arr.length+')</div>'+arr.map(function(x){return itemHTML(x[0],x[1],true);}).join('');
    }
    var html=secao('⚠ Vencidas',vencidas,'venc')+secao('Hoje',hoje)+secao('Próximos 7 dias',prox)+secao('Mais tarde',depois);
    if(mostrarConc)html+=secao('Concluídas (recentes)',concl.slice(-25).reverse());
    p.innerHTML=html||'<div class="vazio">Nenhuma pendência. 🎉</div>';
  }
}

function atualizarResponsaveis(){
  var sel=document.getElementById('f-resp'),dl=document.getElementById('resp-list');
  var atual=sel.value;
  var nomes={};tarefas.forEach(function(t){if(t.resp)nomes[t.resp]=1;});
  var lista=Object.keys(nomes).sort();
  sel.innerHTML='<option value="">Todos os responsáveis</option>'+lista.map(function(n){return '<option'+(n===atual?' selected':'')+'>'+esc(n)+'</option>';}).join('');
  dl.innerHTML=lista.map(function(n){return '<option value="'+esc(n)+'"></option>';}).join('');
}

// ═══════════════ Modal ═══════════════
function montarDias(sel){
  var el=document.getElementById('m-dias');
  el.innerHTML=DIAS_L.map(function(d,i){
    return '<span class="dia-chk'+((sel||[]).indexOf(i)!==-1?' on':'')+'" data-d="'+i+'" onclick="this.classList.toggle(\'on\')">'+d[0]+'</span>';
  }).join('');
}
function mostraDias(){
  var rec=document.getElementById('m-rec').value;
  document.getElementById('m-dias-wrap').style.display=rec==='semanal'?'block':'none';
  // intervalo (termino) so faz sentido para tarefa que nao repete
  document.getElementById('m-fim-wrap').style.display=rec==='nenhuma'?'block':'none';
}
function novaTarefa(dia){
  editandoId=null;
  document.getElementById('m-titulo').textContent='Nova tarefa';
  document.getElementById('m-tit').value='';
  document.getElementById('m-resp').value='';
  document.getElementById('m-data').value=(typeof dia==='string')?dia:cursor;
  document.getElementById('m-datafim').value='';
  document.getElementById('m-hora').value='';
  document.getElementById('m-prio').value='normal';
  document.getElementById('m-rec').value='nenhuma';
  document.getElementById('m-obs').value='';
  document.getElementById('m-del').style.display='none';
  montarDias([]);mostraDias();
  document.getElementById('overlay').classList.add('open');
  setTimeout(function(){document.getElementById('m-tit').focus();},50);
}
function abrirTarefa(id){
  var t=achar(id);if(!t)return;
  editandoId=id;
  document.getElementById('m-titulo').textContent='Editar tarefa';
  document.getElementById('m-tit').value=t.titulo||'';
  document.getElementById('m-resp').value=t.resp||'';
  document.getElementById('m-data').value=t.data||hojeISO();
  document.getElementById('m-datafim').value=t.dataFim||'';
  document.getElementById('m-hora').value=t.hora||'';
  document.getElementById('m-prio').value=t.prio||'normal';
  document.getElementById('m-rec').value=t.rec||'nenhuma';
  document.getElementById('m-obs').value=t.obs||'';
  document.getElementById('m-del').style.display='block';
  montarDias(t.recDias||[]);mostraDias();
  document.getElementById('overlay').classList.add('open');
}
function salvarTarefa(){
  var tit=document.getElementById('m-tit').value.trim();
  var data=document.getElementById('m-data').value;
  if(!tit){alert('Dê um título para a tarefa.');return;}
  if(!data){alert('Escolha a data de início.');return;}
  var recV=document.getElementById('m-rec').value;
  var fim=document.getElementById('m-datafim').value;
  if(recV!=='nenhuma')fim='';
  if(fim&&fim<data){alert('O término não pode ser antes do início.');return;}
  var dias=[];document.querySelectorAll('#m-dias .dia-chk.on').forEach(function(e){dias.push(+e.dataset.d);});
  var obj={
    titulo:tit,
    resp:document.getElementById('m-resp').value.trim(),
    data:data,
    dataFim:fim,
    hora:document.getElementById('m-hora').value,
    prio:document.getElementById('m-prio').value,
    rec:recV,
    recDias:dias,
    obs:document.getElementById('m-obs').value.trim()
  };
  if(editandoId){
    var t=achar(editandoId);Object.assign(t,obj);
  } else {
    obj.id='t'+Date.now()+Math.random().toString(36).slice(2,6);
    obj.done=false;obj.doneDates=[];
    tarefas.push(obj);
  }
  salvar();fecharModal();desenhar();
}
function excluirTarefa(){
  if(!editandoId)return;
  if(!confirm('Excluir esta tarefa? (rotinas somem de todos os dias)'))return;
  tarefas=tarefas.filter(function(t){return t.id!==editandoId;});
  salvar();fecharModal();desenhar();
}
function fecharModal(){document.getElementById('overlay').classList.remove('open');editandoId=null;}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){fecharModal();return;}
  var emCampo=/^(INPUT|SELECT|TEXTAREA)$/.test(e.target.tagName||'');
  if((e.key==='n'||e.key==='N')&&!emCampo&&!document.getElementById('overlay').classList.contains('open')){e.preventDefault();novaTarefa();}
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

desenhar();
syncLoad();
setInterval(function(){desenhar();},60000); // reavalia vencidas a cada minuto
var _rt=null;window.addEventListener('resize',function(){clearTimeout(_rt);_rt=setTimeout(desenhar,150);}); // redesenha ao girar/redimensionar
</script>
