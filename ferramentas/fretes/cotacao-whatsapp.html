<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cotação WhatsApp — Explotools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 4px;
    }

    input, select {
      padding: 9px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #1a1a2e;
      background: #fff;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #25d366;
    }

    input[readonly] {
      background: #f7f7f7;
      color: #777;
      cursor: not-allowed;
    }

    .badge-fixo {
      font-size: 0.68rem;
      color: #25d366;
      font-weight: 600;
      margin-left: 4px;
    }

    .btn-gerar {
      width: 100%;
      padding: 13px;
      background: #25d366;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 16px;
    }

    .btn-gerar:hover { background: #1db954; }

    .output-area {
      display: none;
    }

    .output-area.visible { display: block; }

    textarea#mensagem {
      width: 100%;
      height: 340px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px;
      font-size: 0.88rem;
      font-family: monospace;
      color: #222;
      resize: vertical;
      line-height: 1.6;
    }

    .btn-copiar {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #1a1a2e;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-copiar:hover { background: #2d2d50; }

    .btn-copiar.copiado {
      background: #25d366;
    }

    .hint {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 6px;
      text-align: center;
    }

    @media (max-width: 500px) {
      .row { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>
<div class="container">

  <h1>Cotação para Transportadora</h1>
  <p class="subtitle">Preencha os dados variáveis e clique em Gerar Mensagem para copiar no WhatsApp.</p>

  <!-- REMETENTE (fixo) -->
  <div class="card">
    <div class="card-title">Remetente <span class="badge-fixo">fixo</span></div>
    <div class="row">
      <div class="field">
        <label>CNPJ Remetente</label>
        <input type="text" id="cnpj_remetente" value="58.079.793/0001-66" readonly>
      </div>
      <div class="field">
        <label>CEP de Origem</label>
        <input type="text" id="cep_origem" value="22765-270" readonly>
      </div>
    </div>
  </div>

  <!-- DESTINATÁRIO -->
  <div class="card">
    <div class="card-title">Destinatário</div>
    <div class="row">
      <div class="field">
        <label>CNPJ Destinatário</label>
        <input type="text" id="cnpj_dest" placeholder="00.000.000/0000-00" maxlength="18">
      </div>
      <div class="field">
        <label>CEP de Destino</label>
        <input type="text" id="cep_dest" placeholder="00000-000" maxlength="9">
      </div>
    </div>
  </div>

  <!-- PAGADOR -->
  <div class="card">
    <div class="card-title">Pagador do Frete</div>
    <div class="row">
      <div class="field">
        <label>CNPJ Pagador</label>
        <input type="text" id="cnpj_pag" placeholder="00.000.000/0000-00 (deixe em branco se for o remetente)" maxlength="18">
      </div>
    </div>
  </div>

  <!-- CARGA -->
  <div class="card">
    <div class="card-title">Carga</div>
    <div class="row">
      <div class="field">
        <label>Tipo de Material <span class="badge-fixo">padrão</span></label>
        <input type="text" id="material" value="Carga padrão / Ferramentas">
      </div>
      <div class="field">
        <label>Tipo de Embalagem</label>
        <input type="text" id="embalagem" placeholder="ex: caixa, palete...">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Valor da Nota Fiscal (R$)</label>
        <input type="text" id="valor_nf" placeholder="0,00">
      </div>
      <div class="field">
        <label>Quantidade de Volumes</label>
        <input type="number" id="qtd_volumes" placeholder="1" min="1">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Peso Total (kg)</label>
        <input type="text" id="peso" placeholder="0,0">
      </div>
      <div class="field">
        <label>Medidas por Volume (C x L x A cm)</label>
        <input type="text" id="medidas" placeholder="ex: 30 x 30 x 30">
      </div>
    </div>
  </div>

  <button class="btn-gerar" onclick="gerarMensagem()">Gerar Mensagem</button>

  <div class="output-area card" id="output">
    <div class="card-title">Mensagem gerada</div>
    <textarea id="mensagem" readonly></textarea>
    <button class="btn-copiar" id="btn-copiar" onclick="copiar()">Copiar para WhatsApp</button>
    <p class="hint">Cole direto na conversa do WhatsApp com a transportadora.</p>
  </div>

</div>

<script>
  // Máscaras simples
  document.getElementById('cnpj_dest').addEventListener('input', function() {
    this.value = mascaraCNPJ(this.value);
  });
  document.getElementById('cnpj_pag').addEventListener('input', function() {
    this.value = mascaraCNPJ(this.value);
  });
  document.getElementById('cep_dest').addEventListener('input', function() {
    this.value = mascaraCEP(this.value);
  });

  function mascaraCNPJ(v) {
    v = v.replace(/\D/g, '').slice(0, 14);
    if (v.length > 12) return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
    if (v.length > 8)  return v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})/, '$1.$2.$3/$4');
    if (v.length > 5)  return v.replace(/(\d{2})(\d{3})(\d{3})/, '$1.$2.$3');
    if (v.length > 2)  return v.replace(/(\d{2})(\d{3})/, '$1.$2');
    return v;
  }

  function mascaraCEP(v) {
    v = v.replace(/\D/g, '').slice(0, 8);
    if (v.length > 5) return v.replace(/(\d{5})(\d{1,3})/, '$1-$2');
    return v;
  }

  function gerarMensagem() {
    const cnpjRem  = document.getElementById('cnpj_remetente').value;
    const cepOri   = document.getElementById('cep_origem').value;
    const cnpjDest = document.getElementById('cnpj_dest').value.trim();
    const cepDest  = document.getElementById('cep_dest').value.trim();
    const cnpjPag  = document.getElementById('cnpj_pag').value.trim();
    const material = document.getElementById('material').value.trim();
    const embala   = document.getElementById('embalagem').value.trim();
    const valorNF  = document.getElementById('valor_nf').value.trim();
    const qtd      = document.getElementById('qtd_volumes').value.trim();
    const peso     = document.getElementById('peso').value.trim();
    const medidas  = document.getElementById('medidas').value.trim();

    const pagador = cnpjPag || cnpjRem + ' (remetente)';

    const msg =
`Olá! Preciso de uma cotação de frete com as informações abaixo:

📦 CARGA
• Tipo de material: ${material || '—'}
• Tipo de embalagem: ${embala || '—'}
• Quantidade de volumes: ${qtd || '—'}
• Peso total: ${peso ? peso + ' kg' : '—'}
• Medidas por volume: ${medidas ? medidas + ' cm (C x L x A)' : '—'}
• Valor da nota fiscal: ${valorNF ? 'R$ ' + valorNF : '—'}

📍 REMETENTE
• CNPJ: ${cnpjRem}
• CEP de origem: ${cepOri} (Jacarepaguá, RJ)

🏢 DESTINATÁRIO
• CNPJ: ${cnpjDest || '—'}
• CEP de destino: ${cepDest || '—'}

💳 PAGADOR DO FRETE
• CNPJ: ${pagador}

Aguardo o retorno com valor e prazo. Obrigado!`;

    document.getElementById('mensagem').value = msg;
    const out = document.getElementById('output');
    out.classList.add('visible');
    out.scrollIntoView({ behavior: 'smooth', block: 'start' });

    const btn = document.getElementById('btn-copiar');
    btn.classList.remove('copiado');
    btn.textContent = 'Copiar para WhatsApp';
  }

  function copiar() {
    const ta = document.getElementById('mensagem');
    navigator.clipboard.writeText(ta.value).then(() => {
      const btn = document.getElementById('btn-copiar');
      btn.textContent = '✓ Copiado!';
      btn.classList.add('copiado');
      setTimeout(() => {
        btn.textContent = 'Copiar para WhatsApp';
        btn.classList.remove('copiado');
      }, 2500);
    });
  }
</script>
</body>
</html>
